pointcloud_to_laserscan:
  ros__parameters:
    target_frame: "utlidar_lidar"
    transform_tolerance: 0.01
    min_height: -0.15
    max_height: 0.15
    angle_min: -3.1415
    angle_max: 3.1415
    angle_increment: 0.0087
    scan_time: 0.1
    range_min: 0.3
    range_max: 20.0
    use_inf: true
    reliability: 1  # 1 es Reliable en la API de este nodo