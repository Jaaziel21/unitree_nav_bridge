slam_toolbox:
  ros__parameters:
    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /utlidar/scan 

    # Modo
    mode: mapping
    use_sim_time: false

    # Parámetros del LiDAR
    max_laser_range: 10.0
    minimum_time_interval: 0.1
    transform_timeout: 0.2
    
    # Resolución (5cm por celda es el estándar de Nav2)
    resolution: 0.05